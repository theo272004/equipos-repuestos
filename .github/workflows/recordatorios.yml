name: Recordatorios Telegram

# Revisa los recordatorios y envía los que "ya tocan" al grupo de Telegram.
on:
  schedule:
    - cron: "*/15 * * * *"   # cada 15 minutos (hora UTC)
  workflow_dispatch: {}        # permite ejecutarlo a mano desde la pestaña Actions

# Evita ejecuciones solapadas
concurrency:
  group: recordatorios
  cancel-in-progress: false

jobs:
  enviar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Enviar recordatorios
        run: node scripts/send-reminders.mjs
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FIREBASE_PROJECT_ID: mantenimiento-f405b
          # La API key web es pública (ya está en el sitio), no es un secreto.
          FIREBASE_API_KEY: AIzaSyBQzRHnGBX9TtxrOBoh5KX5dm6agguoSaQ
